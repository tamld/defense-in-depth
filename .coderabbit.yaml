# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en
reviews:
  profile: chill
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  path_instructions:
    - path: "src/guards/**"
      instructions: "Focus on false positive/negative rates. Guards must be pure (no side effects beyond reading files)."
    - path: "src/core/**"
      instructions: "Engine pipeline is critical. Check for error handling, crash protection, and type safety."
  auto_review:
    enabled: true
    drafts: false
chat:
  auto_reply: true
